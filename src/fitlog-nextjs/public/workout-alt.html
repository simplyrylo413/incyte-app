const _p = window.__urlParams || new URLSearchParams();
const state = {
  weight: Number(_p.get('weight')) || 135,
  reps:   Number(_p.get('reps'))   || 19,
  rpe:    Number(_p.get('rpe'))    || 0,
  totalSets:   Number(_p.get('sets')) || 1,
  currentSet: 1,
  restSeconds: Number(_p.get('rest')) || 90,
  timerRunning: false,
  timerRemaining: 90,
  timerInterval: null,
  vuInterval: null,
  logs: [{ num: 1, tags: ['WS'], weight: null, reps: null, done: false }],
};

/* ============== HELPERS ============== */

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* ============== SCROLL PICKERS ============== */
const pickerConfigs = {
  // curve > 1 = more sensitive at the low end (less fader travel per unit at the bottom)
  weight: { id: 'weightTrack', min: 5, max: 300, faderMax: 300, step: 5, curve: 2 },
  reps:   { id: 'repsTrack',   min: 1, max: 30,  step: 1 },
  rpe:    { id: 'rpeTrack',    min: 0, max: 10,  step: 1 },
};

function buildPicker(key) {
  const cfg = pickerConfigs[key];
  const track = document.getElementById(cfg.id);
  track.innerHTML = '';
  for (let i = 0; cfg.min + i * cfg.step <= cfg.max + 1e-9; i++) {
    const v = Math.round((cfg.min + i * cfg.step) * 100) / 100;
    const el = document.createElement('div');
    el.className = 'scroll-item';
    el.textContent = (key === 'rpe' && v === 0) ? '—' : v;
    el.dataset.value = v;
    track.appendChild(el);
  }
  // Encoder drives value during touch; suppress scroll-position-based updates while finger is down
  let touching = false;
  let scrollTimer;
  track.addEventListener('scroll', () => {
    if (touching) return;
    updateSelectedFromScroll(key, false);
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => updateSelectedFromScroll(key, true), 100);
  });
  attachEncoderScroll(track, key,
    () => { touching = true; },
    () => { touching = false; }
  );
}

/* Encoder-style scroll — relative drag: finger travel = value steps.
   Weight picker is velocity-sensitive: slow drag = high threshold, fast swipe = low threshold.
   Reps/RPE use a flat threshold. */
function attachEncoderScroll(track, key, onStart, onEnd) {
  let lastStepX = null;
  let prevMoveX = null, prevMoveT = null, moveVel = 0;

  function stepPxForVelocity() {
    if (key !== 'weight') return 80;
    // px/ms → step threshold: slow finger barely moves, fast flick scrolls freely
    if (moveVel > 1.5)  return 55;   // fast flick
    if (moveVel > 0.8)  return 100;  // medium
    if (moveVel > 0.2)  return 160;  // slow
    return 240;                       // very slow / near-stationary
  }

  track.addEventListener('touchstart', e => {
    e.preventDefault();
    onStart();
    const trackRect = track.getBoundingClientRect();
    const centerX = trackRect.left + trackRect.width / 2;
    const touchX = e.touches[0].clientX;
    if (Math.abs(touchX - centerX) <= 48) {
      lastStepX = touchX;
      prevMoveX = touchX;
      prevMoveT = Date.now();
      moveVel = 0;
    }
  }, { passive: false });

  track.addEventListener('touchmove', e => {
    e.preventDefault();
    if (lastStepX === null) return;
    const x = e.touches[0].clientX;
    const t = Date.now();

    // Update velocity estimate (px/ms, smoothed)
    if (prevMoveT !== null) {
      const dt = Math.max(t - prevMoveT, 1);
      const raw = Math.abs(x - prevMoveX) / dt;
      moveVel = moveVel * 0.4 + raw * 0.6;
    }
    prevMoveX = x;
    prevMoveT = t;

    const stepPx = stepPxForVelocity();
    const delta = lastStepX - x; // positive = dragged left = higher value
    if (Math.abs(delta) >= stepPx) {
      // Fire exactly one step and fully reset reference — prevents multi-step jumps
      const dir = Math.sign(delta);
      const cfg = pickerConfigs[key];
      const newVal = Math.max(cfg.min, Math.min(cfg.max,
        Math.round((state[key] + dir * cfg.step) * 1000) / 1000));
      setValue(key, newVal, false);
      lastStepX = x; // full reset, no remainder carry-over
    }
  }, { passive: false });

  track.addEventListener('touchend', () => {
    lastStepX = null;
    prevMoveX = null; prevMoveT = null; moveVel = 0;
    onEnd();
    setValue(key, state[key], true);
  });
}

function updateSelectedFromScroll(key, finalize = true) {
  const cfg = pickerConfigs[key];
  const track = document.getElementById(cfg.id);
  const trackRect = track.getBoundingClientRect();
  const centerX = trackRect.left + trackRect.width / 2;

  let closest = null;
  let closestDist = Infinity;
  const items = track.querySelectorAll('.scroll-item');
  items.forEach(item => {
    const r = item.getBoundingClientRect();
    const itemCenter = r.left + r.width / 2;
    const dist = Math.abs(centerX - itemCenter);
    if (dist < closestDist) {
      closestDist = dist;
      closest = item;
    }
  });

  items.forEach(item => {
    const r = item.getBoundingClientRect();
    const itemCenter = r.left + r.width / 2;
    const dist = Math.abs(centerX - itemCenter);
    item.classList.remove('selected', 'near');
    if (dist < 24) item.classList.add('selected');
    else if (dist < 70) item.classList.add('near');
  });

  if (closest && finalize) {
    const v = parseFloat(closest.dataset.value);
    state[key] = v;
    const itemRect = closest.getBoundingClientRect();
    const offset = (itemRect.left + itemRect.width/2) - centerX;
    if (Math.abs(offset) > 1) {
      track.scrollBy({ left: offset, behavior: 'smooth' });
    }
  }
}

function setValue(key, value, scroll = true) {
  const cfg = pickerConfigs[key];
  value = Math.max(cfg.min, Math.min(cfg.max, value));
  state[key] = value;
  const track = document.getElementById(cfg.id);
  if (track) {
    const items = track.querySelectorAll('.scroll-item');
    items.forEach(item => {
      if (parseFloat(item.dataset.value) === value) {
        if (scroll) item.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        setTimeout(() => updateSelectedFromScroll(key, false), 60);
      }
    });
  }
  updateReadouts();
  // Sync fader visuals if a fader exists for this key
  if (typeof window.__paintFader === 'function') window.__paintFader(key);
}

/* ============== READOUT SYNC (cassette SVG text) ============== */
function updateReadouts() {
  const w = document.getElementById('weightReadout');
  const r = document.getElementById('repsReadout');
  const p = document.getElementById('rpeReadout');
  const pt = document.getElementById('rpeReadoutTop');
  if (w) w.textContent = state.weight;
  if (r) r.textContent = state.reps;
  if (p) p.textContent = state.rpe === 0 ? '—' : state.rpe;
  if (pt) pt.textContent = state.rpe === 0 ? '—' : state.rpe;
  // Light up VU bars to reflect RPE (when timer is idle)
  if (!state.timerRunning) {
    const bars = document.getElementById('vuBars');
    if (bars) {
      const total = bars.children.length;
      const lit = state.rpe === 0 ? 0 : Math.min(total, Math.round((state.rpe / 10) * total));
      for (let i = 0; i < total; i++) {
        if (i < lit) {
          bars.children[i].setAttribute('fill', i >= 7 ? '#ff3030' : '#f5ec00');
          bars.children[i].setAttribute('opacity', '1');
        } else {
          bars.children[i].setAttribute('fill', '#2a2e33');
          bars.children[i].setAttribute('opacity', '1');
        }
      }
    }
  }
}

/* ============== VU-BAR FADERS — drag up/down to set value, spins the reel ============== */
const FADER_BARS = 14;       // # of LED bar segments in each fader column
const FADER_PAD = 4;         // top/bottom padding inside .fader-track (matches CSS)

// Must be initialized before setupFaders IIFE so visualRot alias works correctly
window.__reelRot = { weight: 0, reps: 0 };

(function setupFaders() {
  const reelL = document.getElementById('reelL');
  const reelR = document.getElementById('reelR');
  // Share rotation state with timer RAF so both systems stay in sync
  const visualRot = window.__reelRot;
  let lastDragY = null;
  // Degrees of reel rotation per pixel of finger/mouse movement
  const ROT_PER_PX = 3;

  // Build LED bar DOM inside each track
  document.querySelectorAll('.fader-track').forEach(track => {
    // Remove the static thumb we put in the HTML so we can position it ourselves
    const thumb = track.querySelector('.fader-thumb');
    // Insert bar elements before the thumb so flex-direction:column-reverse stacks them from bottom
    for (let i = 0; i < FADER_BARS; i++) {
      const bar = document.createElement('div');
      bar.className = 'fader-bar';
      track.insertBefore(bar, thumb);
    }
  });

  function ratioToValue(key, ratio) {
    const cfg = pickerConfigs[key];
    const effectiveMax = cfg.faderMax !== undefined ? cfg.faderMax : cfg.max;
    const curved = cfg.curve ? Math.pow(ratio, cfg.curve) : ratio;
    const rawValue = cfg.min + curved * (effectiveMax - cfg.min);
    const stepIndex = Math.round((rawValue - cfg.min) / cfg.step);
    return Math.max(cfg.min, Math.min(effectiveMax, cfg.min + stepIndex * cfg.step));
  }
  function valueToRatio(key, value) {
    const cfg = pickerConfigs[key];
    const effectiveMax = cfg.faderMax !== undefined ? cfg.faderMax : cfg.max;
    const clamped = Math.max(cfg.min, Math.min(effectiveMax, value));
    const base = (clamped - cfg.min) / (effectiveMax - cfg.min);
    return cfg.curve ? Math.pow(Math.max(0, base), 1 / cfg.curve) : base;
  }

  function paintFader(key) {
    const track = document.querySelector(`.fader-track[data-key="${key}"]`);
    if (!track) return;
    const ratio = valueToRatio(key, state[key]);
    const bars = track.querySelectorAll('.fader-bar');
    const lit = Math.round(ratio * FADER_BARS);
    bars.forEach((bar, i) => {
      // bars[0] is at the bottom because of column-reverse
      bar.classList.toggle('on', i < lit);
      bar.classList.toggle('hot', i < lit && i >= FADER_BARS - 2);
    });
    // Move the yellow thumb indicator to the current value's Y position
    const thumb = track.querySelector('.fader-thumb');
    if (thumb) {
      const usableH = track.clientHeight - FADER_PAD * 2;
      const topPx = FADER_PAD + (1 - ratio) * usableH;
      thumb.style.top = `${topPx}px`;
    }
    // Reels are now driven by drag direction in onMove, not by value.
    // Only init: set transform once at startup so the reels have a base position.
    if (key === 'weight' && reelL && !reelL.hasAttribute('transform')) {
      reelL.setAttribute('transform', `rotate(${visualRot.weight} 95 100)`);
    } else if (key === 'reps' && reelR && !reelR.hasAttribute('transform')) {
      reelR.setAttribute('transform', `rotate(${visualRot.reps} 265 100)`);
    }
    // Update digital readout above the fader
    const val = document.getElementById(`fadVal-${key}`);
    if (val) val.textContent = (key === 'rpe' && state[key] === 0) ? '—' : state[key];
  }
  // Expose so setValue() can refresh fader visuals
  window.__paintFader = paintFader;

  function handleDrag(track, clientY) {
    const r = track.getBoundingClientRect();
    const usableH = r.height - FADER_PAD * 2;
    let relY = clientY - r.top - FADER_PAD;
    relY = Math.max(0, Math.min(usableH, relY));
    const ratio = 1 - (relY / usableH);  // 1 at top, 0 at bottom
    const key = track.dataset.key;
    const newValue = ratioToValue(key, ratio);
    state[key] = newValue;
    setValue(key, newValue, false);
    paintFader(key);
  }

  let activeTrack = null;
  let faderLastY = null;
  let faderPrevY = null, faderPrevT = null, faderVel = 0;

  function faderStepPx(key) {
    // Weight: 59 steps (reference). Reps: 29 steps (~0.5x). RPE: 10 steps (~0.17x).
    // Thresholds scale down so traversing each picker's full range takes similar effort.
    if (key === 'weight') {
      if (faderVel > 1.5) return 5;
      if (faderVel > 0.8) return 14;
      if (faderVel > 0.2) return 18;
      return 18;
    }
    if (key === 'reps') {
      if (faderVel > 1.5) return 5;
      if (faderVel > 0.8) return 14;
      if (faderVel > 0.2) return 18;
      return 18;
    }
    // rpe — 20% slower than weight/reps
    if (faderVel > 1.5) return 6;
    if (faderVel > 0.8) return 17;
    if (faderVel > 0.2) return 22;
    return 22;
  }

  function onDown(e) {
    const track = e.currentTarget;
    activeTrack = track;
    track.classList.add('dragging');
    const pt = e.touches ? e.touches[0] : e;
    lastDragY = pt.clientY;
    faderLastY = pt.clientY;
    faderPrevY = pt.clientY;
    faderPrevT = Date.now();
    faderVel = 0; // start in near-stationary bucket (20px) until movement detected
    e.preventDefault();
  }
  function onMove(e) {
    if (!activeTrack) return;
    const pt = e.touches ? e.touches[0] : e;
    const currentY = pt.clientY;
    const deltaY = currentY - lastDragY;
    lastDragY = currentY;

    // Update velocity estimate
    const t = Date.now();
    if (faderPrevT !== null) {
      const dt = Math.max(t - faderPrevT, 1);
      const raw = Math.abs(currentY - faderPrevY) / dt;
      faderVel = faderVel * 0.4 + raw * 0.6;
    }
    faderPrevY = currentY;
    faderPrevT = t;

    // Rotate reel based on drag direction
    const key = activeTrack.dataset.key;
    if (key === 'weight' && reelL) {
      visualRot.weight -= deltaY * ROT_PER_PX;
      reelL.setAttribute('transform', `rotate(${visualRot.weight} 95 100)`);
    } else if (key === 'reps' && reelR) {
      visualRot.reps -= deltaY * ROT_PER_PX;
      reelR.setAttribute('transform', `rotate(${visualRot.reps} 265 100)`);
    }

    // Encoder: one step per threshold crossed, full reset after each step
    const yDelta = faderLastY - currentY; // positive = dragged UP = increase value
    const stepPx = faderStepPx(key);
    if (Math.abs(yDelta) >= stepPx) {
      const dir = Math.sign(yDelta);
      const cfg = pickerConfigs[key];
      const newVal = Math.max(cfg.min, Math.min(cfg.max,
        Math.round((state[key] + dir * cfg.step) * 1000) / 1000));
      setValue(key, newVal, false);
      faderLastY = currentY;
      paintFader(key);
    }

    e.preventDefault();
  }
  function onUp() {
    if (!activeTrack) return;
    activeTrack.classList.remove('dragging');
    lastDragY = null;
    faderLastY = null;
    faderPrevY = null; faderPrevT = null; faderVel = 0;
    activeTrack = null;
  }

  document.querySelectorAll('.fader-track').forEach(track => {
    track.addEventListener('mousedown', onDown);
    track.addEventListener('touchstart', onDown, { passive: false });
    // Mouse wheel over a track also adjusts the value (and spins reel correctly)
    track.addEventListener('wheel', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const key = track.dataset.key;
      const cfg = pickerConfigs[key];
      const dir = e.deltaY > 0 ? -1 : 1;   // scroll up = +1 value
      const newValue = Math.max(cfg.min, Math.min(cfg.max, state[key] + dir * cfg.step));
      state[key] = newValue;
      setValue(key, newValue, false);
      paintFader(key);
      // Spin reel in the matching direction: scroll up → right, scroll down → left
      if (key === 'weight' && reelL) {
        visualRot.weight += dir * 18;
        reelL.setAttribute('transform', `rotate(${visualRot.weight} 95 100)`);
      } else if (key === 'reps' && reelR) {
        visualRot.reps += dir * 18;
        reelR.setAttribute('transform', `rotate(${visualRot.reps} 265 100)`);
      }
    }, { passive: false });
  });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onUp);

  // Initial paint
  requestAnimationFrame(() => {
    paintFader('weight');
    paintFader('reps');
    paintFader('rpe');
  });
})();

/* ============== MOUSE DRAG-TO-SCROLL (desktop) + WHEEL ============== */
function enableDragScroll(track) {
  let isDown = false;
  let startX, scrollLeft, moved;

  track.addEventListener('mousedown', (e) => {
    isDown = true;
    moved = false;
    track.style.cursor = 'grabbing';
    startX = e.pageX - track.offsetLeft;
    scrollLeft = track.scrollLeft;
    e.preventDefault();
  });
  document.addEventListener('mouseup', () => {
    if (isDown) {
      isDown = false;
      track.style.cursor = 'grab';
    }
  });
  document.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    const x = e.pageX - track.offsetLeft;
    const walk = (x - startX) * 1.2;
    if (Math.abs(walk) > 3) moved = true;
    track.scrollLeft = scrollLeft - walk;
  });
  // Suppress click after drag
  track.addEventListener('click', (e) => {
    if (moved) { e.stopPropagation(); e.preventDefault(); }
  }, true);

  // Mouse wheel = horizontal scroll on pickers (without needing shift)
  track.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      track.scrollLeft += e.deltaY;
      e.preventDefault();
    }
  }, { passive: false });

  track.style.cursor = 'grab';
}
document.querySelectorAll('.scroll-track').forEach(enableDragScroll);

/* ============== STEPPERS ============== */
document.querySelectorAll('.stepper').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.target;
    const dir = parseInt(btn.dataset.dir, 10);
    const cfg = pickerConfigs[key];
    setValue(key, state[key] + dir * cfg.step, true);
  });
});

/* ============== LOG LIST ============== */
function renderLog() {
  const container = document.getElementById('logList');
  container.innerHTML = '';

  const next = state.logs.find(l => !l.done);
  state.currentSet = next ? next.num : state.totalSets;
  const currentIdx = next ? state.logs.indexOf(next) : -1;

  // Show: all done sets + current active set + one upcoming set
  const visibleLogs = state.logs.filter((log, idx) => {
    if (log.done) return true;
    if (idx === currentIdx) return true;       // the NOW set
    if (idx === currentIdx + 1) return true;   // the next set
    return false;
  });

  visibleLogs.forEach((log) => {
    const idx = state.logs.indexOf(log);
    const row = document.createElement('div');
    const isCurrent = log.num === state.currentSet && !log.done;
    const isNext = !log.done && !isCurrent;
    row.className = 'log-row' + (isCurrent ? ' current' : '') + (log.done ? ' done-row' : '') + (isNext ? ' future' : '');
    row.style.position = 'relative';

    // Inner flex wrapper (slides left on swipe to reveal remove btn)
    const inner = document.createElement('div');
    inner.className = 'log-row-inner';

    const num = document.createElement('div');
    num.className = 'log-num';
    num.textContent = String(log.num).padStart(2, '0');
    inner.appendChild(num);

    const tags = document.createElement('div');
    tags.className = 'log-tags';

    // --- Set-type tag (WU / WS) first, then NOW pill alongside it ---
    const typeTag = log.tags.includes('WU') ? 'WU' : (log.tags.includes('WS') ? 'WS' : null);
    if (typeTag) {
      const t = document.createElement('div');
      t.className = 'log-tag ' + (typeTag === 'WU' ? 'log-tag-wu' : 'log-tag-ws');
      t.textContent = typeTag === 'WU' ? 'WARM UP' : 'WORK';
      t.title = typeTag === 'WU' ? 'Warm up — tap to switch to Work' : 'Work — tap to switch to Warm up';
      t.addEventListener('click', () => {
        if (log.tags.includes('WU')) {
          log.tags = log.tags.filter(x => x !== 'WU');
          log.tags.unshift('WS');
        } else {
          log.tags = log.tags.filter(x => x !== 'WS');
          log.tags.unshift('WU');
        }
        renderLog();
      });
      tags.appendChild(t);
    }

    if (isCurrent) {
      const now = document.createElement('div');
      now.className = 'log-tag log-tag-now';
      now.textContent = 'NOW';
      tags.appendChild(now);
    }

    inner.appendChild(tags);

    const val = document.createElement('div');
    val.className = 'log-value' + (log.weight === null ? ' empty' : '');
    if (log.weight !== null) {
      val.innerHTML = `${log.weight} <span class="x-sep">×</span> ${log.reps}`;
    } else {
      val.textContent = '— × —';
    }
    inner.appendChild(val);

    const check = document.createElement('div');
    check.className = 'log-check' + (log.done ? ' done' : '');
    if (log.done) check.innerHTML = '<svg><use href="#i-check"/></svg>';
    check.addEventListener('click', () => {
      log.done = !log.done;
      renderLog();
    });
    // Remove button — inline at right edge of row
    const removeBtn = document.createElement('button');
    removeBtn.className = 'log-remove';
    removeBtn.setAttribute('aria-label', 'Remove set');
    removeBtn.innerHTML = '✕';
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      row.style.transition = 'opacity 0.18s, max-height 0.22s';
      row.style.opacity = '0';
      row.style.maxHeight = row.offsetHeight + 'px';
      requestAnimationFrame(() => {
        row.style.maxHeight = '0';
        row.style.padding = '0';
        row.style.overflow = 'hidden';
      });
      setTimeout(() => {
        state.logs.splice(idx, 1);
        state.logs.forEach((l, i) => { l.num = i + 1; });
        state.totalSets = state.logs.length;
        renderLog();
      }, 220);
    });
    // Add-set button — inserts a blank set after this one
    const addBtn = document.createElement('button');
    addBtn.className = 'log-add';
    addBtn.setAttribute('aria-label', 'Add set after');
    addBtn.innerHTML = '+';
    addBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const newSet = { num: 0, tags: ['WS'], weight: null, reps: null, done: false };
      state.logs.splice(idx + 1, 0, newSet);
      state.logs.forEach((l, i) => { l.num = i + 1; });
      state.totalSets = state.logs.length;
      renderLog();
    });
    inner.appendChild(check);
    inner.appendChild(removeBtn);
    inner.appendChild(addBtn);

    row.appendChild(inner);


    container.appendChild(row);
  });

  document.getElementById('setCounter').textContent = `${state.currentSet} / ${state.totalSets}`;
  document.getElementById('logSetNumber').textContent = state.currentSet;
  const logSetNumber2 = document.getElementById('logSetNumber2');
  if (logSetNumber2) logSetNumber2.textContent = state.currentSet;
}

/* ============== ACTIONS ============== */
// New cassette LOG SET button — fires the same handler as the original
const _logSetBtn2 = document.getElementById('logSetBtn2');
if (_logSetBtn2) _logSetBtn2.addEventListener('click', () => {
  document.getElementById('logSetBtn').click();
  _logSetBtn2.classList.add('flashing');
  setTimeout(() => _logSetBtn2.classList.remove('flashing'), 400);
});

document.getElementById('logSetBtn').addEventListener('click', () => {
  const target = state.logs.find(l => l.num === state.currentSet && !l.done) || state.logs.find(l => !l.done);
  if (!target) return;
  target.weight = state.weight;
  target.reps = state.reps;
  target.rpe = state.rpe;
  target.done = true;
  renderLog();
  startTimer();
  showAIInsight();
  // Scroll log panel into view so user sees the logged set
  const logPanel = document.querySelector('.log-panel');
  if (logPanel) setTimeout(() => logPanel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
});

function showAIInsight() {
  const btn = document.getElementById('aiBtn');
  if (!btn) return;
  const doneSets = state.logs.filter(l => l.done);
  if (doneSets.length === 0) return;

  const lastSet = doneSets[doneSets.length - 1];
  const rpe = lastSet.rpe || 0;
  const reps = lastSet.reps || state.reps;
  const remaining = state.logs.filter(l => !l.done).length;

  let msg = '';
  if (rpe === 0) {
    msg = remaining > 0 ? `${remaining} set${remaining > 1 ? 's' : ''} remaining. Log RPE for better recommendations.` : 'Session complete.';
  } else if (rpe <= 5) {
    msg = `RPE ${rpe} — well below threshold. Add 5–10 lb next set.`;
  } else if (rpe === 6) {
    msg = `RPE 6 — good working pace. Maintain weight.`;
  } else if (rpe === 7) {
    msg = remaining > 2 ? `RPE 7 — on target. Hold weight for remaining sets.` : `RPE 7 — strong finish. Consider +5 lb next session.`;
  } else if (rpe === 8) {
    msg = remaining > 0 ? `RPE 8 — near limit. Keep weight steady.` : `RPE 8 — good effort. Micro-load +2.5 lb next session.`;
  } else if (rpe === 9) {
    msg = remaining > 0 ? `RPE 9 — drop 5 lb for remaining sets.` : `RPE 9 — maximum effort recorded.`;
  } else if (rpe === 10) {
    msg = remaining > 0 ? `RPE 10 — drop weight 10 lb for next set.` : `RPE 10 — all-out. Full recovery before next session.`;
  }

  // Flash the AI button and show insight in the ticker if present
  btn.classList.add('active');
  const ticker = document.querySelector('.led-ticker-text');
  if (ticker && msg) {
    ticker.textContent = msg;
    const tickerWrap = document.querySelector('.led-ticker-wrap');
    if (tickerWrap) tickerWrap.style.display = 'block';
  }

  // Brief flash on the button
  setTimeout(() => btn.classList.remove('active'), 2000);
}

document.getElementById('clearBtn').addEventListener('click', () => {
  state.logs.forEach(l => { l.weight = null; l.reps = null; l.done = false; });
  renderLog();
  stopTimer();
});

/* ============== TIMER ============== */
let _reelRAF = null;
const REEL_SPEED = 0.4; // degrees per frame while timer runs

function _tickReels() {
  if (!state.timerRunning) { _reelRAF = null; return; }
  window.__reelRot.weight += REEL_SPEED;
  window.__reelRot.reps   += REEL_SPEED;
  const rL = document.getElementById('reelL');
  const rR = document.getElementById('reelR');
  if (rL) rL.setAttribute('transform', `rotate(${window.__reelRot.weight} 95 100)`);
  if (rR) rR.setAttribute('transform', `rotate(${window.__reelRot.reps} 265 100)`);
  _reelRAF = requestAnimationFrame(_tickReels);
}

const RING_CIRC = 289.0; // 2π × 46 ≈ 289.03

/* Build annular sector path — visible arc ends fixed at 3pm, start sweeps CW as frac decreases */
function annularSectorPath(cx, cy, rO, rI, frac) {
  if (frac <= 0) return '';
  const f = (n) => n.toFixed(2);
  if (frac >= 1) {
    // Full ring via two half-arcs (outer CW, inner CCW) — evenodd punches the hole
    return [
      `M ${cx} ${f(cy - rO)}`,
      `A ${rO} ${rO} 0 1 1 ${cx} ${f(cy + rO)}`,
      `A ${rO} ${rO} 0 1 1 ${cx} ${f(cy - rO)} Z`,
      `M ${cx} ${f(cy - rI)}`,
      `A ${rI} ${rI} 0 1 0 ${cx} ${f(cy + rI)}`,
      `A ${rI} ${rI} 0 1 0 ${cx} ${f(cy - rI)} Z`,
    ].join(' ');
  }
  // startAngle: (1-frac)*2π CW from 3pm (SVG: x right, y down, CW = positive angle)
  const sa = (1 - frac) * 2 * Math.PI;
  const ea = 0; // 3pm is always the fixed end (cos=1, sin=0)
  const la = frac > 0.5 ? 1 : 0;
  const x1o = f(cx + rO * Math.cos(sa)), y1o = f(cy + rO * Math.sin(sa));
  const x2o = f(cx + rO),                y2o = f(cy); // 3pm outer
  const x2i = f(cx + rI),                y2i = f(cy); // 3pm inner
  const x1i = f(cx + rI * Math.cos(sa)), y1i = f(cy + rI * Math.sin(sa));
  // Outer arc CW to 3pm → line in to 3pm inner → inner arc CCW back to start → close
  return `M ${x1o} ${y1o} A ${rO} ${rO} 0 ${la} 1 ${x2o} ${y2o} L ${x2i} ${y2i} A ${rI} ${rI} 0 ${la} 0 ${x1i} ${y1i} Z`;
}

function updateReelRings() {
  const ringL = document.getElementById('reelRingL');
  const ringR = document.getElementById('reelRingR');
  const secL  = document.getElementById('reelSectorL');
  const secR  = document.getElementById('reelSectorR');

  const frac = state.timerRunning ? Math.max(0, state.timerRemaining / state.restSeconds) : 0;

  // Ring: end anchored at 3pm, gap grows clockwise from 3pm.
  // stroke-dasharray shrinks the arc; negative dashoffset slides the start CW
  // so the clockwise END stays pinned at 3pm.
  const arcLen = parseFloat((RING_CIRC * frac).toFixed(1));
  const offset = (arcLen - RING_CIRC).toFixed(1); // negative → shifts start CW
  if (ringL) { ringL.setAttribute('stroke-dasharray', `${arcLen} ${RING_CIRC}`); ringL.setAttribute('stroke-dashoffset', offset); }
  if (ringR) { ringR.setAttribute('stroke-dasharray', `${arcLen} ${RING_CIRC}`); ringR.setAttribute('stroke-dashoffset', offset); }

  // Spoke sectors: same clockwise erasure, annular r=22–41
  if (secL) secL.setAttribute('d', annularSectorPath(95,  100, 41, 22, frac));
  if (secR) secR.setAttribute('d', annularSectorPath(265, 100, 41, 22, frac));
}

function startTimer() {
  stopTimer();
  state.timerRemaining = state.restSeconds;
  state.timerRunning = true;
  updateTimerDisplay();
  updateReelRings();
  state.timerInterval = setInterval(() => {
    state.timerRemaining--;
    if (state.timerRemaining <= 0) {
      stopTimer();
      return;
    }
    updateTimerDisplay();
    updateReelRings();
  }, 1000);
  state.vuInterval = setInterval(animateVU, 130);
  _reelRAF = requestAnimationFrame(_tickReels);
}

function stopTimer() {
  clearInterval(state.timerInterval);
  clearInterval(state.vuInterval);
  if (_reelRAF) { cancelAnimationFrame(_reelRAF); _reelRAF = null; }
  state.timerRunning = false;
  state.timerRemaining = state.restSeconds;
  updateTimerDisplay();
  updateReelRings();
  const bars = document.getElementById('vuBars').children;
  const defaults = ['0.95','0.85','0.75','0.55','0','0','0','0','0'];
  for (let i = 0; i < bars.length; i++) {
    if (defaults[i] === '0') bars[i].setAttribute('fill', '#2a2e33');
    else { bars[i].setAttribute('fill', '#f5ec00'); bars[i].setAttribute('opacity', defaults[i]); }
  }
}

function animateVU() {
  const bars = document.getElementById('vuBars').children;
  const lit = Math.floor(Math.random() * 6) + 3;
  for (let i = 0; i < bars.length; i++) {
    if (i < lit) {
      bars[i].setAttribute('fill', i >= 7 ? '#ff3030' : '#f5ec00');
      bars[i].setAttribute('opacity', (1 - i * 0.06).toFixed(2));
    } else {
      bars[i].setAttribute('fill', '#2a2e33');
      bars[i].setAttribute('opacity', '1');
    }
  }
}

function updateTimerDisplay() {
  document.getElementById('timerText').textContent = formatTime(state.timerRemaining);
  document.getElementById('restTopVal').textContent = formatTime(state.timerRemaining);
  document.getElementById('restBtnTime').textContent = formatTime(state.restSeconds).replace(/^0/, '');
}

document.getElementById('restBtn').addEventListener('click', () => {
  if (state.timerRunning) { stopTimer(); }
  else { startTimer(); }
});

document.getElementById('timerStrip').addEventListener('click', () => {
  if (state.timerRunning) { stopTimer(); }
  else { startTimer(); }
});

/* ============== MISC ============== */
/* ============== FADER OPEN / CLOSE TOGGLE ============== */
(function setupFaderToggle() {
  const btn = document.getElementById('faderToggle');
  const wrap = document.getElementById('mixerWrap');
  if (!btn || !wrap) return;
  const label = btn.querySelector('.open-label');
  btn.addEventListener('click', () => {
    const open = wrap.classList.toggle('is-open');
    btn.classList.toggle('is-open', open);
    btn.setAttribute('aria-expanded', String(open));
    if (label) label.textContent = open ? 'CLOSE' : 'ADJUST';
    // Refresh the fader visuals when opening so bars+thumbs are positioned correctly
    if (open && typeof window.__paintFader === 'function') {
      requestAnimationFrame(() => {
        window.__paintFader('weight');
        window.__paintFader('reps');
        window.__paintFader('rpe');
      });
    }
  });
})();

// backBtn: URL param bootstrap already wired history.back(); this is a no-op fallback
// AI button: toggle on/off independently of the nav group
document.getElementById('aiBtn').addEventListener('click', () => {
  const btn = document.getElementById('aiBtn');
  const on = btn.classList.toggle('active');
});

// MPC nav — click inner .mpc-pad, active class on .mpc-pad-wrapper, sync scale labels
document.querySelectorAll('.mpc-pad-wrapper').forEach(wrapper => {
  wrapper.querySelector('.mpc-pad').addEventListener('click', () => {
    document.querySelectorAll('.mpc-pad-wrapper').forEach(w => w.classList.remove('active'));
    wrapper.classList.add('active');
    const tab = wrapper.dataset.tab;
    document.querySelectorAll('.mpc-scale-label[data-tab]').forEach(l => {
      l.classList.toggle('active-label', l.dataset.tab === tab);
    });
  });
});

/* ============== MORE POPUP + LIGHT MODE ============== */
(function() {
  const morePad   = document.getElementById('morePad');
  const popup     = document.getElementById('morePopup');
  const toggle    = document.getElementById('lightModeToggle');
  const lightRow  = document.getElementById('lightModeRow');
  let lightOn = false;

  function applyLightMode(on) {
    lightOn = on;
    document.body.classList.toggle('light-mode', on);
    toggle.classList.toggle('on', on);
    // Picker fades reference the strip bg color — update them
    document.querySelectorAll('.picker-fade-l, .picker-fade-r').forEach(el => {
      el.style.opacity = on ? '1' : ''; // CSS handles the color via body.light-mode
    });
  }

  morePad.addEventListener('click', (e) => {
    e.stopPropagation();
    popup.classList.toggle('open');
  });

  lightRow.addEventListener('click', (e) => {
    e.stopPropagation();
    applyLightMode(!lightOn);
  });

  document.addEventListener('click', () => popup.classList.remove('open'));
  popup.addEventListener('click', e => e.stopPropagation());
})();

/* ============== INIT ============== */
buildPicker('weight');
buildPicker('reps');
buildPicker('rpe');

requestAnimationFrame(() => {
  try {
    setValue('weight', state.weight, true);
    setValue('reps', state.reps, true);
    setValue('rpe', state.rpe, true);
    updateTimerDisplay();
  } catch(e) { console.error('init-a:', e); }
  try {
    renderLog();
    updateReadouts();
  } catch(e) { console.error('init-b:', e); }
});

</script>
