<script>
/* ============== STATE ============== */
/* ── Scramble-reveal for the LED name display ── */
/* Animates text character-by-character — each char cycles through random glyphs
   before snapping to the correct letter, staggered left-to-right.
   Equivalent of AnimateNumber's slot-machine digit roll, applied to text. */
function scrambleLedText(text, opts) {
  const GLYPHS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@!%$&*+=?';
  const staggerMs  = (opts && opts.stagger)  || 52;   // ms delay per character
  const cycleMs    = (opts && opts.cycleMs)  || 42;   // ms per scramble frame
  const minCycles  = (opts && opts.minCycles)|| 10;   // min scramble frames
  const maxExtra   = (opts && opts.maxExtra) || 7;    // random extra frames
  const container  = document.getElementById('ledNameDisplay');
  if (!container) return;

  const upper = text.toUpperCase();
  container.innerHTML = '';

  // Build one <span class="led-char"> per character
  const spans = upper.split('').map(ch => {
    const span = document.createElement('span');
    span.className = 'led-char';
    span.setAttribute('aria-hidden', 'true');
    span.textContent = ch === ' ' ? ' ' : GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
    container.appendChild(span);
    return { el: span, final: ch };
  });

  // Hidden accessible label so screen readers get the real text
  let sr = container.querySelector('.sr-only');
  if (!sr) {
    sr = document.createElement('span');
    sr.className = 'sr-only';
    sr.style.cssText = 'position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);';
    container.appendChild(sr);
  }
  sr.textContent = text;

  // Stagger each character's scramble interval
  spans.forEach(({ el, final }, i) => {
    if (final === ' ') { el.textContent = ' '; return; }

    const cycles = minCycles + Math.floor(Math.random() * maxExtra);
    let frame = 0;

    setTimeout(() => {
      const iv = setInterval(() => {
        if (frame >= cycles) {
          clearInterval(iv);
          el.textContent = final;
          el.classList.add('settling');
          setTimeout(() => el.classList.remove('settling'), 200);
          return;
        }
        el.textContent = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
        frame++;
      }, cycleMs);
    }, i * staggerMs);
  });
}

/* ── URL param bootstrap ── */
(function() {
  const p = new URLSearchParams(location.search);
  const name = p.get('name') || 'Leg Extension';
  // Scramble-reveal on DOMContentLoaded so container is in the DOM
  // Inline scripts run after DOM is parsed — call directly, no DOMContentLoaded needed
  scrambleLedText(name);
  if (p.get('bodypart')) document.getElementById('mvBodyPart').textContent = p.get('bodypart').toUpperCase();
  document.title = name + ' — Workout';
  // Back button returns to caller
  document.getElementById('backBtn').addEventListener('click', () => history.back(), { once: true });
  window.__urlParams = p;
})();

const _p = window.__urlParams || new URLSearchParams();
const state = {
  weight: Number(_p.get('weight')) || 225,
  reps:   Number(_p.get('reps'))   || 19,
  rpe:    Number(_p.get('rpe'))    || 8,
  totalSets:   Number(_p.get('sets')) || 6,
  currentSet: 1,
  restSeconds: Number(_p.get('rest')) || 90,
  timerRunning: false,
  timerRemaining: 90,
  timerInterval: null,
  vuInterval: null,
  logs: [
    { num: 1, tags: ['WU','BW'], weight: 95,  reps: 10, done: true  },
    { num: 2, tags: ['BW'],      weight: 115, reps: 10, done: true  },
    { num: 3, tags: ['BW'],      weight: null,reps: null,done: false },
    { num: 4, tags: ['WS'],      weight: 155, reps: 10, done: false },
    { num: 5, tags: ['WS'],      weight: 155, reps: 10, done: false },
    { num: 6, tags: ['WS'],      weight: 155, reps: 10, done: false },
  ],
};

/* ============== HELPERS ============== */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove('show'), 1500);
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* ============== SCROLL PICKERS ============== */
const pickerConfigs = {
  // curve > 1 = more sensitive at the low end (less fader travel per unit at the bottom)
  weight: { id: 'weightTrack', min: 5, max: 500, step: 5, curve: 2 },
  reps:   { id: 'repsTrack',   min: 1, max: 30,  step: 1 },
  rpe:    { id: 'rpeTrack',    min: 1, max: 10,  step: 1 },
};

function buildPicker(key) {
  const cfg = pickerConfigs[key];
  const track = document.getElementById(cfg.id);
  track.innerHTML = '';
  for (let v = cfg.min; v <= cfg.max; v += cfg.step) {
    const el = document.createElement('div');
    el.className = 'scroll-item';
    el.textContent = v;
    el.dataset.value = v;
    el.addEventListener('click', () => setValue(key, v, true));
    track.appendChild(el);
  }
  let scrollTimer;
  track.addEventListener('scroll', () => {
    updateSelectedFromScroll(key, false);
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => updateSelectedFromScroll(key, true), 100);
  });
}

function updateSelectedFromScroll(key, finalize = true) {
  const cfg = pickerConfigs[key];
  const track = document.getElementById(cfg.id);
  const trackRect = track.getBoundingClientRect();
  const centerX = trackRect.left + trackRect.width / 2;

  let closest = null;
  let closestDist = Infinity;
  const items = track.querySelectorAll('.scroll-item');
  items.forEach(item => {
    const r = item.getBoundingClientRect();
    const itemCenter = r.left + r.width / 2;
    const dist = Math.abs(centerX - itemCenter);
    if (dist < closestDist) {
      closestDist = dist;
      closest = item;
    }
  });

  items.forEach(item => {
    const r = item.getBoundingClientRect();
    const itemCenter = r.left + r.width / 2;
    const dist = Math.abs(centerX - itemCenter);
    item.classList.remove('selected', 'near');
    if (dist < 24) item.classList.add('selected');
    else if (dist < 70) item.classList.add('near');
  });

  if (closest && finalize) {
    const v = parseInt(closest.dataset.value, 10);
    state[key] = v;
    const itemRect = closest.getBoundingClientRect();
    const offset = (itemRect.left + itemRect.width/2) - centerX;
    if (Math.abs(offset) > 1) {
      track.scrollBy({ left: offset, behavior: 'smooth' });
    }
  }
}

function setValue(key, value, scroll = true) {
  const cfg = pickerConfigs[key];
  value = Math.max(cfg.min, Math.min(cfg.max, value));
  state[key] = value;
  const track = document.getElementById(cfg.id);
  if (track) {
    const items = track.querySelectorAll('.scroll-item');
    items.forEach(item => {
      if (parseInt(item.dataset.value, 10) === value) {
        if (scroll) item.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        setTimeout(() => updateSelectedFromScroll(key, false), 60);
      }
    });
  }
  updateReadouts();
  // Sync fader visuals if a fader exists for this key
  if (typeof window.__paintFader === 'function') window.__paintFader(key);
}

/* ============== READOUT SYNC (cassette SVG text) ============== */
function updateReadouts() {
  const w = document.getElementById('weightReadout');
  const r = document.getElementById('repsReadout');
  const p = document.getElementById('rpeReadout');
  if (w) w.textContent = state.weight;
  if (r) r.textContent = state.reps;
  if (p) p.textContent = state.rpe;
  // Light up VU bars to reflect RPE (when timer is idle)
  if (!state.timerRunning) {
    const bars = document.getElementById('vuBars');
    if (bars) {
      const total = bars.children.length;
      // RPE 1-10 → light up 1-9 bars (cap at 9)
      const lit = Math.min(total, Math.round((state.rpe / 10) * total));
      for (let i = 0; i < total; i++) {
        if (i < lit) {
          bars.children[i].setAttribute('fill', i >= 7 ? '#ff3030' : '#f5ec00');
          bars.children[i].setAttribute('opacity', '1');
        } else {
          bars.children[i].setAttribute('fill', '#2a2e33');
          bars.children[i].setAttribute('opacity', '1');
        }
      }
    }
  }
}

/* ============== VU-BAR FADERS — drag up/down to set value, spins the reel ============== */
const FADER_BARS = 14;       // # of LED bar segments in each fader column
const FADER_PAD = 4;         // top/bottom padding inside .fader-track (matches CSS)

(function setupFaders() {
  const reelL = document.getElementById('reelL');
  const reelR = document.getElementById('reelR');
  const visualRot = { weight: 0, reps: 0 };
  let lastDragY = null;
  // Degrees of reel rotation per pixel of finger/mouse movement
  const ROT_PER_PX = 3;

  // Build LED bar DOM inside each track
  document.querySelectorAll('.fader-track').forEach(track => {
    // Remove the static thumb we put in the HTML so we can position it ourselves
    const thumb = track.querySelector('.fader-thumb');
    // Insert bar elements before the thumb so flex-direction:column-reverse stacks them from bottom
    for (let i = 0; i < FADER_BARS; i++) {
      const bar = document.createElement('div');
      bar.className = 'fader-bar';
      track.insertBefore(bar, thumb);
    }
  });

  function ratioToValue(key, ratio) {
    const cfg = pickerConfigs[key];
    // Apply non-linear curve so low values get more fader travel
    const curved = cfg.curve ? Math.pow(ratio, cfg.curve) : ratio;
    const rawValue = cfg.min + curved * (cfg.max - cfg.min);
    const stepIndex = Math.round((rawValue - cfg.min) / cfg.step);
    return Math.max(cfg.min, Math.min(cfg.max, cfg.min + stepIndex * cfg.step));
  }
  function valueToRatio(key, value) {
    const cfg = pickerConfigs[key];
    const base = (value - cfg.min) / (cfg.max - cfg.min);
    return cfg.curve ? Math.pow(base, 1 / cfg.curve) : base;
  }

  function paintFader(key) {
    const track = document.querySelector(`.fader-track[data-key="${key}"]`);
    if (!track) return;
    const ratio = valueToRatio(key, state[key]);
    const bars = track.querySelectorAll('.fader-bar');
    const lit = Math.round(ratio * FADER_BARS);
    bars.forEach((bar, i) => {
      // bars[0] is at the bottom because of column-reverse
      bar.classList.toggle('on', i < lit);
      bar.classList.toggle('hot', i < lit && i >= FADER_BARS - 2);
    });
    // Move the yellow thumb indicator to the current value's Y position
    const thumb = track.querySelector('.fader-thumb');
    if (thumb) {
      const usableH = track.clientHeight - FADER_PAD * 2;
      const topPx = FADER_PAD + (1 - ratio) * usableH;
      thumb.style.top = `${topPx}px`;
    }
    // Reels are now driven by drag direction in onMove, not by value.
    // Only init: set transform once at startup so the reels have a base position.
    if (key === 'weight' && reelL && !reelL.hasAttribute('transform')) {
      reelL.setAttribute('transform', `rotate(${visualRot.weight} 95 100)`);
    } else if (key === 'reps' && reelR && !reelR.hasAttribute('transform')) {
      reelR.setAttribute('transform', `rotate(${visualRot.reps} 265 100)`);
    }
    // Update digital readout above the fader
    const val = document.getElementById(`fadVal-${key}`);
    if (val) val.textContent = state[key];
  }
  // Expose so setValue() can refresh fader visuals
  window.__paintFader = paintFader;

  function handleDrag(track, clientY) {
    const r = track.getBoundingClientRect();
    const usableH = r.height - FADER_PAD * 2;
    let relY = clientY - r.top - FADER_PAD;
    relY = Math.max(0, Math.min(usableH, relY));
    const ratio = 1 - (relY / usableH);  // 1 at top, 0 at bottom
    const key = track.dataset.key;
    const newValue = ratioToValue(key, ratio);
    state[key] = newValue;
    setValue(key, newValue, false);
    paintFader(key);
  }

  let activeTrack = null;

  function onDown(e) {
    const track = e.currentTarget;
    activeTrack = track;
    track.classList.add('dragging');
    const pt = e.touches ? e.touches[0] : e;
    lastDragY = pt.clientY;
    handleDrag(track, pt.clientY);
    e.preventDefault();
  }
  function onMove(e) {
    if (!activeTrack) return;
    const pt = e.touches ? e.touches[0] : e;
    const currentY = pt.clientY;
    const deltaY = currentY - lastDragY;  // > 0 means moved DOWN, < 0 means moved UP
    lastDragY = currentY;

    // Rotate the reel based on drag direction:
    //   push UP (deltaY < 0) → rotate clockwise (positive degrees / right)
    //   push DOWN (deltaY > 0) → rotate counter-clockwise (negative degrees / left)
    const key = activeTrack.dataset.key;
    if (key === 'weight' && reelL) {
      visualRot.weight -= deltaY * ROT_PER_PX;
      reelL.setAttribute('transform', `rotate(${visualRot.weight} 95 100)`);
    } else if (key === 'reps' && reelR) {
      visualRot.reps -= deltaY * ROT_PER_PX;
      reelR.setAttribute('transform', `rotate(${visualRot.reps} 265 100)`);
    }
    handleDrag(activeTrack, currentY);
    e.preventDefault();
  }
  function onUp() {
    if (!activeTrack) return;
    activeTrack.classList.remove('dragging');
    lastDragY = null;
    activeTrack = null;
  }

  document.querySelectorAll('.fader-track').forEach(track => {
    track.addEventListener('mousedown', onDown);
    track.addEventListener('touchstart', onDown, { passive: false });
    // Mouse wheel over a track also adjusts the value (and spins reel correctly)
    track.addEventListener('wheel', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const key = track.dataset.key;
      const cfg = pickerConfigs[key];
      const dir = e.deltaY > 0 ? -1 : 1;   // scroll up = +1 value
      const newValue = Math.max(cfg.min, Math.min(cfg.max, state[key] + dir * cfg.step));
      state[key] = newValue;
      setValue(key, newValue, false);
      paintFader(key);
      // Spin reel in the matching direction: scroll up → right, scroll down → left
      if (key === 'weight' && reelL) {
        visualRot.weight += dir * 18;
        reelL.setAttribute('transform', `rotate(${visualRot.weight} 95 100)`);
      } else if (key === 'reps' && reelR) {
        visualRot.reps += dir * 18;
        reelR.setAttribute('transform', `rotate(${visualRot.reps} 265 100)`);
      }
    }, { passive: false });
  });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onUp);

  // Initial paint
  requestAnimationFrame(() => {
    paintFader('weight');
    paintFader('reps');
    paintFader('rpe');
  });
})();

/* ============== MOUSE DRAG-TO-SCROLL (desktop) + WHEEL ============== */
function enableDragScroll(track) {
  let isDown = false;
  let startX, scrollLeft, moved;

  track.addEventListener('mousedown', (e) => {
    isDown = true;
    moved = false;
    track.style.cursor = 'grabbing';
    startX = e.pageX - track.offsetLeft;
    scrollLeft = track.scrollLeft;
    e.preventDefault();
  });
  document.addEventListener('mouseup', () => {
    if (isDown) {
      isDown = false;
      track.style.cursor = 'grab';
    }
  });
  document.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    const x = e.pageX - track.offsetLeft;
    const walk = (x - startX) * 1.2;
    if (Math.abs(walk) > 3) moved = true;
    track.scrollLeft = scrollLeft - walk;
  });
  // Suppress click after drag
  track.addEventListener('click', (e) => {
    if (moved) { e.stopPropagation(); e.preventDefault(); }
  }, true);

  // Mouse wheel = horizontal scroll on pickers (without needing shift)
  track.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      track.scrollLeft += e.deltaY;
      e.preventDefault();
    }
  }, { passive: false });

  track.style.cursor = 'grab';
}
document.querySelectorAll('.scroll-track').forEach(enableDragScroll);

/* ============== STEPPERS ============== */
document.querySelectorAll('.stepper').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.target;
    const dir = parseInt(btn.dataset.dir, 10);
    const cfg = pickerConfigs[key];
    setValue(key, state[key] + dir * cfg.step, true);
  });
});

/* ============== LOG LIST ============== */
function renderLog() {
  const container = document.getElementById('logList');
  container.innerHTML = '';

  const next = state.logs.find(l => !l.done);
  state.currentSet = next ? next.num : state.totalSets;

  state.logs.forEach((log, idx) => {
    const row = document.createElement('div');
    const isCurrent = log.num === state.currentSet && !log.done;
    row.className = 'log-row' + (isCurrent ? ' current' : '') + (log.done ? ' done-row' : '');
    row.style.position = 'relative';

    // Inner flex wrapper (slides left on swipe to reveal remove btn)
    const inner = document.createElement('div');
    inner.className = 'log-row-inner';

    const num = document.createElement('div');
    num.className = 'log-num';
    num.textContent = String(log.num).padStart(2, '0');
    inner.appendChild(num);

    const tags = document.createElement('div');
    tags.className = 'log-tags';

    // --- Set-type tag (WU / WS) — mutually exclusive toggle ---
    const typeTag = log.tags.includes('WU') ? 'WU' : (log.tags.includes('WS') ? 'WS' : null);
    if (typeTag) {
      const t = document.createElement('div');
      t.className = 'log-tag active log-tag-type';
      t.textContent = typeTag;
      t.title = typeTag === 'WU' ? 'Warmup — tap to change to Working Set' : 'Working Set — tap to change to Warmup';
      t.addEventListener('click', () => {
        if (log.tags.includes('WU')) {
          log.tags = log.tags.filter(x => x !== 'WU');
          log.tags.unshift('WS');
        } else {
          log.tags = log.tags.filter(x => x !== 'WS');
          log.tags.unshift('WU');
        }
        renderLog();
      });
      tags.appendChild(t);
    }

    // --- BW tag — independent toggle ---
    const hasBW = log.tags.includes('BW');
    const bw = document.createElement('div');
    bw.className = 'log-tag' + (hasBW ? ' active' : ' inactive');
    bw.textContent = 'BW';
    bw.title = hasBW ? 'Bodyweight — tap to remove' : 'Tap to mark as bodyweight';
    bw.addEventListener('click', () => {
      if (log.tags.includes('BW')) {
        log.tags = log.tags.filter(x => x !== 'BW');
      } else {
        log.tags.push('BW');
      }
      renderLog();
    });
    tags.appendChild(bw);

    inner.appendChild(tags);

    const val = document.createElement('div');
    val.className = 'log-value' + (log.weight === null ? ' empty' : '');
    if (log.weight !== null) {
      val.innerHTML = `${log.weight} <span class="x-sep">×</span> ${log.reps}`;
    } else {
      val.textContent = '— × —';
    }
    inner.appendChild(val);

    const check = document.createElement('div');
    check.className = 'log-check' + (log.done ? ' done' : '');
    if (log.done) check.innerHTML = '<svg><use href="#i-check"/></svg>';
    check.addEventListener('click', () => {
      log.done = !log.done;
      renderLog();
    });
    inner.appendChild(check);

    row.appendChild(inner);

    // Remove button — absolutely positioned, revealed by hover or swipe
    const removeBtn = document.createElement('button');
    removeBtn.className = 'log-remove';
    removeBtn.setAttribute('aria-label', 'Remove set');
    removeBtn.innerHTML = '✕';
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      // Animate out, then remove
      row.style.transition = 'opacity 0.18s, max-height 0.22s';
      row.style.opacity = '0';
      row.style.maxHeight = row.offsetHeight + 'px';
      requestAnimationFrame(() => {
        row.style.maxHeight = '0';
        row.style.padding = '0';
        row.style.overflow = 'hidden';
      });
      setTimeout(() => {
        state.logs.splice(idx, 1);
        // Re-number remaining sets
        state.logs.forEach((l, i) => { l.num = i + 1; });
        state.totalSets = state.logs.length;
        renderLog();
        showToast('SET REMOVED');
      }, 220);
    });
    row.appendChild(removeBtn);

    // Swipe-left to reveal remove (touch devices)
    let touchStartX = null;
    inner.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    inner.addEventListener('touchmove', (e) => {
      if (touchStartX === null) return;
      const dx = e.touches[0].clientX - touchStartX;
      if (dx < -20) { row.classList.add('swiped'); }
      else if (dx > 10) { row.classList.remove('swiped'); }
    }, { passive: true });

    container.appendChild(row);
  });

  document.getElementById('setCounter').textContent = `${state.currentSet} / ${state.totalSets}`;
  document.getElementById('logSetNumber').textContent = state.currentSet;
  const logSetNumber2 = document.getElementById('logSetNumber2');
  if (logSetNumber2) logSetNumber2.textContent = state.currentSet;
}

/* ============== ACTIONS ============== */
// New cassette LOG SET button — fires the same handler as the original
const _logSetBtn2 = document.getElementById('logSetBtn2');
if (_logSetBtn2) _logSetBtn2.addEventListener('click', () => {
  document.getElementById('logSetBtn').click();
  _logSetBtn2.classList.add('flashing');
  setTimeout(() => _logSetBtn2.classList.remove('flashing'), 400);
});

document.getElementById('logSetBtn').addEventListener('click', () => {
  const target = state.logs.find(l => l.num === state.currentSet && !l.done) || state.logs.find(l => !l.done);
  if (!target) {
    showToast('ALL SETS COMPLETE');
    return;
  }
  target.weight = state.weight;
  target.reps = state.reps;
  target.done = true;
  showToast(`SET ${target.num} LOGGED`);
  renderLog();
  startTimer();
  // Scroll log panel into view so user sees the logged set
  const logPanel = document.querySelector('.log-panel');
  if (logPanel) setTimeout(() => logPanel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  state.logs.forEach(l => { l.weight = null; l.reps = null; l.done = false; });
  showToast('CLEARED');
  renderLog();
  stopTimer();
});

/* ============== TIMER ============== */
function startTimer() {
  stopTimer();
  state.timerRemaining = state.restSeconds;
  state.timerRunning = true;
  // Clear any manual spin transform so the CSS animation can take over
  document.getElementById('reelL').removeAttribute('transform');
  document.getElementById('reelR').removeAttribute('transform');
  document.getElementById('reelL').classList.add('spinning');
  document.getElementById('reelR').classList.add('spinning');
  updateTimerDisplay();
  state.timerInterval = setInterval(() => {
    state.timerRemaining--;
    if (state.timerRemaining <= 0) {
      stopTimer();
      showToast('REST COMPLETE');
      return;
    }
    updateTimerDisplay();
  }, 1000);
  state.vuInterval = setInterval(animateVU, 130);
}

function stopTimer() {
  clearInterval(state.timerInterval);
  clearInterval(state.vuInterval);
  state.timerRunning = false;
  document.getElementById('reelL').classList.remove('spinning');
  document.getElementById('reelR').classList.remove('spinning');
  state.timerRemaining = state.restSeconds;
  updateTimerDisplay();
  const bars = document.getElementById('vuBars').children;
  const defaults = ['0.95','0.85','0.75','0.55','0','0','0','0','0'];
  for (let i = 0; i < bars.length; i++) {
    if (defaults[i] === '0') bars[i].setAttribute('fill', '#2a2e33');
    else { bars[i].setAttribute('fill', '#f5ec00'); bars[i].setAttribute('opacity', defaults[i]); }
  }
}

function animateVU() {
  const bars = document.getElementById('vuBars').children;
  const lit = Math.floor(Math.random() * 6) + 3;
  for (let i = 0; i < bars.length; i++) {
    if (i < lit) {
      bars[i].setAttribute('fill', i >= 7 ? '#ff3030' : '#f5ec00');
      bars[i].setAttribute('opacity', (1 - i * 0.06).toFixed(2));
    } else {
      bars[i].setAttribute('fill', '#2a2e33');
      bars[i].setAttribute('opacity', '1');
    }
  }
}

function updateTimerDisplay() {
  document.getElementById('timerText').textContent = formatTime(state.timerRemaining);
  document.getElementById('restTopVal').textContent = formatTime(state.timerRemaining);
  document.getElementById('restBtnTime').textContent = formatTime(state.restSeconds).replace(/^0/, '');
}

document.getElementById('restBtn').addEventListener('click', () => {
  if (state.timerRunning) { stopTimer(); showToast('TIMER STOPPED'); }
  else { startTimer(); showToast('TIMER STARTED'); }
});

document.getElementById('timerStrip').addEventListener('click', () => {
  const input = prompt('Set rest time in seconds (e.g. 90):', state.restSeconds);
  if (input) {
    const n = parseInt(input, 10);
    if (!isNaN(n) && n > 0 && n < 3600) {
      state.restSeconds = n;
      state.timerRemaining = n;
      updateTimerDisplay();
      showToast(`REST ${formatTime(n)}`);
    }
  }
});

/* ============== MISC ============== */
/* ============== FADER OPEN / CLOSE TOGGLE ============== */
(function setupFaderToggle() {
  const btn = document.getElementById('faderToggle');
  const wrap = document.getElementById('mixerWrap');
  if (!btn || !wrap) return;
  const label = btn.querySelector('.open-label');
  btn.addEventListener('click', () => {
    const open = wrap.classList.toggle('is-open');
    btn.classList.toggle('is-open', open);
    btn.setAttribute('aria-expanded', String(open));
    if (label) label.textContent = open ? 'CLOSE' : 'OPEN';
    // Refresh the fader visuals when opening so bars+thumbs are positioned correctly
    if (open && typeof window.__paintFader === 'function') {
      requestAnimationFrame(() => {
        window.__paintFader('weight');
        window.__paintFader('reps');
        window.__paintFader('rpe');
      });
    }
  });
})();

// backBtn: URL param bootstrap already wired history.back(); this is a no-op fallback
// AI button: toggle on/off independently of the nav group
document.getElementById('aiBtn').addEventListener('click', () => {
  const btn = document.getElementById('aiBtn');
  const on = btn.classList.toggle('active');
  showToast(on ? 'AI ON' : 'AI OFF');
});

// Nav group toggle — exclude the AI and Back buttons (they're not nav tabs)
document.querySelectorAll('.nav-btn:not(.ai-nav-btn)').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn:not(.ai-nav-btn)').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    showToast(btn.dataset.tab);
  });
});

/* ============== INIT ============== */
buildPicker('weight');
buildPicker('reps');
buildPicker('rpe');

requestAnimationFrame(() => {
  setValue('weight', state.weight, true);
  setValue('reps', state.reps, true);
  setValue('rpe', state.rpe, true);
  updateTimerDisplay();
  renderLog();
  updateReadouts();
});

</script>
