# Netlify build configuration for INCYTE (Next.js static export → Capacitor).
# output: 'export' in next.config.js produces the /out directory.

[build]
  base    = "src/fitlog-nextjs"
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# SPA-style fallback so direct URL access (/momentum, /today, etc.) works.
# Next.js static export generates /momentum/index.html so this only fires
# for truly unmatched paths.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Force browsers to revalidate HTML on every visit — prevents stale mobile cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Long-cache hashed JS/CSS chunks (Next.js filenames include content hash)
[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
